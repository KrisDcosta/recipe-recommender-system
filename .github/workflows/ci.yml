name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Tests and imports
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,api]"

      - name: Check imports
        run: |
          python - <<'PY'
          import app.main
          import scripts.train
          import scripts.evaluate
          import scripts.embed_recipes
          import src.models
          import src.metrics
          PY

      - name: Run tests
        run: python -m pytest tests/ -q

  docker:
    name: Docker build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build runtime image
        run: docker build --target runtime -t recipe-recommender:test .
