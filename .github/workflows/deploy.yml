name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  SERVICE_NAME: recipe-recommender
  GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}
  GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY || 'recipe-recommender' }}
  RUN_SERVICE_ACCOUNT: ${{ vars.RUN_SERVICE_ACCOUNT }}

jobs:
  deploy:
    name: Build, push, and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Build image
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/${SERVICE_NAME}:${GITHUB_SHA}"
          docker build --target runtime -t "${IMAGE}" .
          echo "IMAGE=${IMAGE}" >> "${GITHUB_ENV}"

      - name: Push image
        run: docker push "${IMAGE}"

      - name: Deploy Cloud Run service
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          MODEL_GCS_URI: ${{ vars.MODEL_GCS_URI }}
          RECIPES_GCS_URI: ${{ vars.RECIPES_GCS_URI }}
          MODEL_NAME: ${{ vars.MODEL_NAME || 'time_aware_mf' }}
        run: |
          gcloud run deploy "${SERVICE_NAME}" \
            --project "${GCP_PROJECT_ID}" \
            --region "${GCP_REGION}" \
            --image "${IMAGE}" \
            --platform managed \
            --allow-unauthenticated \
            --memory 4Gi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --service-account "${RUN_SERVICE_ACCOUNT}" \
            --set-env-vars "MODEL_GCS_URI=${MODEL_GCS_URI},RECIPES_GCS_URI=${RECIPES_GCS_URI},MODEL_NAME=${MODEL_NAME},LOG_LEVEL=info" \
            --quiet

      - name: Print service URL
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          SERVICE_URL="$(gcloud run services describe "${SERVICE_NAME}" \
            --project "${GCP_PROJECT_ID}" \
            --region "${GCP_REGION}" \
            --format 'value(status.url)')"
          echo "SERVICE_URL=${SERVICE_URL}" >> "${GITHUB_ENV}"
          echo "${SERVICE_URL}"

      - name: Smoke test deployed service
        run: |
          curl --fail --show-error --silent --max-time 120 "${SERVICE_URL}/health"
          curl --fail --show-error --silent --max-time 120 \
            -X POST "${SERVICE_URL}/recommend" \
            -H "Content-Type: application/json" \
            -d '{"user_id":123,"top_n":2,"exclude_rated":true}'
          curl --fail --show-error --silent --max-time 120 \
            -X POST "${SERVICE_URL}/similar" \
            -H "Content-Type: application/json" \
            -d '{"recipe_id":456,"top_n":2}'
          curl --fail --show-error --silent --max-time 120 "${SERVICE_URL}/metrics"
