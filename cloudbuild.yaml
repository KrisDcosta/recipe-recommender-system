substitutions:
  _REGION: us-central1
  _SERVICE_NAME: recipe-recommender
  _GAR_REPOSITORY: recipe-recommender
  _MODEL_GCS_URI: gs://YOUR_BUCKET/models
  _RECIPES_GCS_URI: gs://YOUR_BUCKET/data/RAW_recipes.csv

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --target
      - runtime
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_GAR_REPOSITORY}/${_SERVICE_NAME}:$SHORT_SHA
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_GAR_REPOSITORY}/${_SERVICE_NAME}:$SHORT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --region
      - ${_REGION}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_GAR_REPOSITORY}/${_SERVICE_NAME}:$SHORT_SHA
      - --platform
      - managed
      - --allow-unauthenticated
      - --memory
      - 2Gi
      - --cpu
      - "1"
      - --min-instances
      - "0"
      - --max-instances
      - "3"
      - --set-env-vars
      - MODEL_GCS_URI=${_MODEL_GCS_URI},RECIPES_GCS_URI=${_RECIPES_GCS_URI},LOG_LEVEL=info

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_GAR_REPOSITORY}/${_SERVICE_NAME}:$SHORT_SHA
