services:
  api:
    build:
      context: .
      target: runtime
    ports:
      - "8080:8080"
    volumes:
      # Mount pre-trained models and dataset from host
      - ./models:/app/models:ro
      - ./data:/app/data:ro
    environment:
      MODEL_DIR: /app/models
      RECIPES_CSV: /app/data/dataset/RAW_recipes.csv
      LOG_LEVEL: info
      PORT: 8080
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
